<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Ventas - A&E Máxima Limpieza</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border-bottom: 4px solid var(--primary-color);
        }
        .stat-card h3 {
            margin: 0;
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 900;
            color: #333;
            margin-top: 10px;
        }
        .btn-excel {
            background-color: #217346; /* Color Excel */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn-excel:hover {
            background-color: #1a5c38;
        }
    </style>
</head>
<body>
    <script>
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:3000'
            : `${window.location.protocol}//${window.location.host}`;
    </script>

    <header class="top-header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo_AE_transparente.jpg.png" alt="A&E Máxima Limpieza" style="max-height: 60px;">
                </a>
            </div>
            <div>
                <h1 style="color: #333; font-size: 24px; text-transform: uppercase;">Dashboard de Ventas</h1>
            </div>
            <div class="user-actions">
                <a href="index.html" style="color: #0044cc; font-weight: bold; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Volver a la tienda</a>
            </div>
        </div>
    </header>

    <main class="main-content container pedidos-container" style="display: block;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 class="section-title" style="margin: 0;">Estadísticas Generales</h2>
            <a id="download-excel-link" href="#" class="btn-excel">
                <i class="fa-solid fa-file-excel"></i> Descargar Reporte Excel
            </a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Ventas Hoy</h3>
                <div class="value" id="stat-daily">$0</div>
            </div>
            <div class="stat-card">
                <h3>Últimos 7 Días</h3>
                <div class="value" id="stat-weekly">$0</div>
            </div>
            <div class="stat-card">
                <h3>Este Mes</h3>
                <div class="value" id="stat-monthly">$0</div>
            </div>
            <div class="stat-card">
                <h3>Este Año</h3>
                <div class="value" id="stat-yearly">$0</div>
            </div>
        </div>
        
        <h2 class="section-title">Historial de Transacciones</h2>
        <div style="overflow-x: auto;">
            <table class="pedidos-table" id="ventas-table">
                <thead>
                    <tr>
                        <th>ID Orden</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Productos</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="ventas-body">
                    <!-- Sales will be injected here -->
                </tbody>
            </table>
        </div>
        <p id="no-ventas-msg" style="text-align: center; color: #888; margin-top: 30px; display: none;">No hay registros de ventas todavía.</p>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('download-excel-link').href = `${API_BASE}/api/descargar-excel-ventas`;
            fetchVentas();
        });

        async function fetchVentas() {
            try {
                const response = await fetch(`${API_BASE}/api/ventas`);
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = 'index.html?error=no_auth';
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                const ventas = await response.json();
                
                renderVentas(ventas);
                calculateStats(ventas);
            } catch (error) {
                console.error("Error obteniendo ventas:", error);
                document.getElementById('no-ventas-msg').innerText = "Error cargando las ventas. Asegúrate de tener permisos administrativos.";
                document.getElementById('no-ventas-msg').style.display = 'block';
            }
        }

        function formatCurrency(amount) {
            return '$' + amount.toLocaleString('es-CL');
        }

        function renderVentas(ventas) {
            const tbody = document.getElementById('ventas-body');
            const noMsg = document.getElementById('no-ventas-msg');
            
            tbody.innerHTML = '';
            
            if (!ventas || ventas.length === 0) {
                noMsg.style.display = 'block';
                return;
            }

            // Invertir para mostrar las más nuevas arriba
            const ventasRecientes = [...ventas].reverse();
            
            noMsg.style.display = 'none';

            ventasRecientes.forEach(venta => {
                const tr = document.createElement('tr');
                
                let productosHTML = '<ul style="margin:0; padding-left:20px; font-size:13px;">';
                if(venta.items) {
                    venta.items.forEach(item => {
                        productosHTML += `<li>${item.quantity}x ${item.name}</li>`;
                    });
                }
                productosHTML += '</ul>';

                tr.innerHTML = `
                    <td style="font-weight:bold;">${venta.id}</td>
                    <td>${venta.date}</td>
                    <td>
                        <strong>${venta.customerName}</strong><br>
                        <span style="font-size:12px; color:#666;">${venta.customerAddress}</span>
                    </td>
                    <td>${productosHTML}</td>
                    <td style="color:#27ae60; font-weight:bold;">${formatCurrency(venta.total)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function calculateStats(ventas) {
            let dailyTotal = 0;
            let weeklyTotal = 0;
            let monthlyTotal = 0;
            let yearlyTotal = 0;

            const now = new Date();
            // Start of today
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            // Start of week (7 days ago)
            const startOfWeek = now.getTime() - (7 * 24 * 60 * 60 * 1000);
            
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            ventas.forEach(venta => {
                const total = parseInt(venta.total) || 0;
                
                // Si la venta tiene isoDate (el formato nuevo y seguro), lo usamos. Si no, intentamos un fallback o lo ignoramos.
                let ventaDate;
                if (venta.isoDate) {
                    ventaDate = new Date(venta.isoDate);
                } else {
                    // Para ventas antiguas si es que existieran (aunque el json es nuevo)
                    // Asumimos que cuentan para todas si no sabemos la fecha exacta, o solo intentamos parsear.
                    ventaDate = new Date(); // Aproximación
                }

                const ventaTime = ventaDate.getTime();

                // Daily
                if (ventaTime >= startOfToday) {
                    dailyTotal += total;
                }

                // Weekly
                if (ventaTime >= startOfWeek) {
                    weeklyTotal += total;
                }

                // Monthly
                if (ventaDate.getMonth() === currentMonth && ventaDate.getFullYear() === currentYear) {
                    monthlyTotal += total;
                }

                // Yearly
                if (ventaDate.getFullYear() === currentYear) {
                    yearlyTotal += total;
                }
            });

            document.getElementById('stat-daily').innerText = formatCurrency(dailyTotal);
            document.getElementById('stat-weekly').innerText = formatCurrency(weeklyTotal);
            document.getElementById('stat-monthly').innerText = formatCurrency(monthlyTotal);
            document.getElementById('stat-yearly').innerText = formatCurrency(yearlyTotal);
        }
    </script>
</body>
</html>
